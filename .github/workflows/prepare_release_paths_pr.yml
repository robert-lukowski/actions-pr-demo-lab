name: Prepare Release Paths

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  prepare-release-paths:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Rename fake demo paths
        run: python .github/workflows/rename_demo_paths.py

      - name: Check for schema changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- ':(glob)tools/**/schema.yaml'; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No schema changes detected. No commit will be pushed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Schema changes detected."
          fi

      - name: Commit schema changes
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- ':(glob)tools/**/schema.yaml'
          git commit -m "Rename fake demo paths for release"

      - name: Push schema changes to pull request branch
        if: steps.changes.outputs.has_changes == 'true'
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: git push origin "HEAD:${PR_HEAD_REF}"
